<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>Abban — Elfin İletişim AI Asistan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a14;--sf:#0c1322;--cd:#111b30;--bd:#1a2a4a;--bdL:#243558;
  --pr:#ffc72c;--prG:#ffc72c44;--ac:#00c8ff;--acG:#00c8ff33;
  --gn:#22c55e;--rd:#ef4444;--tx:#e8edf8;--txM:#9aa8c7;--txD:#5e6f94;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',-apple-system,sans-serif}
#app{display:flex;flex-direction:column;height:100%;position:relative}
#app::before{content:'';position:fixed;inset:0;opacity:.02;pointer-events:none;
  background-image:radial-gradient(var(--ac) 1px,transparent 1px);background-size:30px 30px}

.header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--bd);background:rgba(12,19,34,.9);backdrop-filter:blur(12px);z-index:20;flex-shrink:0}
.logo{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--pr),#e8a800);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:var(--bg)}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr-r{display:flex;align-items:center;gap:6px}
.st-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--cd);
  border-radius:16px;border:1px solid var(--bd);font-size:11px;color:var(--txM)}
.st-dot{width:6px;height:6px;border-radius:50%}
.btn-s{padding:4px 10px;border-radius:8px;border:1px solid var(--bd);background:transparent;
  color:var(--txD);font-size:11px;cursor:pointer}

.stage{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.av-area{display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;transition:all .5s}
.av-area.idle{padding:16px 0;min-height:280px}
.av-area.active{padding:6px 0 0;min-height:140px}

/* Product Card */
.pc-w{position:absolute;top:0;width:42%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:8px;z-index:5}
.pc-w.left{left:0;animation:slL .5s cubic-bezier(.34,1.56,.64,1)}
.pc-w.right{right:0;animation:slR .5s cubic-bezier(.34,1.56,.64,1)}
.pc{background:rgba(12,19,34,.96);border-radius:16px;padding:12px;backdrop-filter:blur(12px)}
.pc-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.pc-t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.pc-x{background:none;border:none;color:var(--txD);font-size:14px;cursor:pointer}
.pc-n{font-size:15px;font-weight:800;color:var(--tx);margin-bottom:2px;line-height:1.2}
.pc-p{font-size:18px;font-weight:800;margin-bottom:6px}
.pc-d{font-size:10.5px;color:var(--txM);line-height:1.4;margin-bottom:8px}
.pc-fs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px}
.pc-f{padding:2px 6px;border-radius:5px;font-size:9px;font-weight:600}
.pc-btn{width:100%;padding:9px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer}
.pc-hint{font-size:8px;color:var(--txD);text-align:center;margin-top:5px}

.chat{flex:1;overflow-y:auto;padding:0 12px 6px;display:flex;flex-direction:column}
.chat-sp{flex:1}
.bw{margin-bottom:7px;display:flex;animation:fU .3s ease}
.bw.u{justify-content:flex-end;padding-left:28px}
.bw.a{justify-content:flex-start;padding-right:20px}
.bb{padding:9px 13px;font-size:13.5px;line-height:1.5;max-width:100%;word-break:break-word}
.bb.u{border-radius:14px 14px 4px 14px;background:linear-gradient(135deg,var(--pr),#ffdb6b);color:var(--bg);font-weight:500}
.bb.a{border-radius:14px 14px 14px 4px;background:var(--cd);border:1px solid var(--bd)}
.td{display:flex;gap:5px;padding:8px 14px}
.td span{width:8px;height:8px;border-radius:50%;background:var(--ac);animation:dp 1s ease infinite}
.td span:nth-child(2){animation-delay:.15s}
.td span:nth-child(3){animation-delay:.3s}
.chips{display:flex;flex-wrap:wrap;gap:5px;padding:6px 0;animation:fU .4s}
.chip{padding:7px 12px;border-radius:18px;border:1px solid var(--bdL);background:var(--cd);
  color:var(--txM);font-size:12px;cursor:pointer;transition:all .2s}
.chip:active{border-color:var(--pr);color:var(--pr)}

.inbar{padding:8px 12px 12px;border-top:1px solid var(--bd);background:rgba(12,19,34,.9);
  backdrop-filter:blur(12px);display:flex;gap:8px;align-items:flex-end;z-index:20;flex-shrink:0}
.inbar input{flex:1;padding:10px 12px;border-radius:12px;border:1px solid var(--bd);
  background:var(--cd);color:var(--tx);font-size:13px;outline:none}
.inbar input:focus{border-color:var(--ac)}
.inbar input::placeholder{color:var(--txD)}
.snd{width:40px;height:40px;border-radius:12px;border:none;font-size:17px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ptt-w{display:flex;flex-direction:column;align-items:center;gap:2px}
.ptt{width:48px;height:48px;border-radius:50%;border:none;color:white;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.ptt-l{font-size:9px;color:var(--txD)}

.idle-s{text-align:center;padding:0 20px}
.idle-t{font-size:22px;font-weight:300;margin-bottom:4px}
.idle-t b{font-weight:800;color:var(--pr)}
.idle-sub{font-size:12px;color:var(--txM);margin-bottom:16px}
.btn-go{padding:12px 28px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--pr),#ffdb6b);
  color:var(--bg);font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px var(--prG)}
.btn-go:active{transform:scale(.97)}

/* Settings Panel */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;z-index:300;padding:12px}
.settings-card{background:var(--sf);border-radius:20px;padding:16px;width:100%;max-width:380px;
  border:1px solid var(--bd);max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.settings-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:-16px;background:var(--sf);padding:16px 0 8px;z-index:5;margin-top:-16px}
.settings-label{font-size:12px;color:var(--txM);margin-bottom:4px;display:block}
.settings-input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--bd);
  background:var(--cd);color:var(--tx);font-size:13px;outline:none;margin-bottom:12px;font-family:monospace}
.settings-input:focus{border-color:var(--ac)}
.settings-btn{width:100%;padding:11px;border-radius:12px;border:none;background:var(--pr);
  color:var(--bg);font-size:14px;font-weight:700;cursor:pointer}
.settings-note{font-size:11px;color:var(--txD);margin-top:10px;line-height:1.5;padding:8px 10px;
  background:var(--cd);border-radius:8px;border:1px solid var(--bd)}
.settings-status{display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:8px}
.settings-ok{color:var(--gn)}
.settings-no{color:var(--rd)}

/* Toast */
.toast{position:fixed;top:52px;left:50%;transform:translateX(-50%);padding:8px 16px;
  border-radius:12px;background:var(--cd);border:1px solid var(--bd);font-size:12px;
  color:var(--txM);z-index:100;animation:fU .3s;pointer-events:none}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;animation:fi .3s}
.mc{background:var(--sf);border-radius:20px;padding:22px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto}
.mc-x{background:none;border:none;color:var(--txD);font-size:20px;cursor:pointer}
.mf{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.mfi{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--cd);border-radius:8px;
  border:1px solid var(--bd);font-size:12px}
.mfi-d{width:6px;height:6px;border-radius:50%}
.mc-btn{width:100%;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer}

@keyframes dp{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
@keyframes fU{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes slR{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slL{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>
<video id="cam" autoplay playsinline muted style="position:fixed;top:52px;left:8px;width:120px;height:90px;border-radius:12px;border:2px solid var(--bd);object-fit:cover;transform:scaleX(-1);z-index:50;display:none;opacity:0.9"></video>
<canvas id="cam-canvas" style="position:fixed;top:52px;left:8px;width:120px;height:90px;border-radius:12px;z-index:51;display:none;pointer-events:none;transform:scaleX(-1)"></canvas>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>

<script>
// ═══ DATA — WEBSITE'DEN CANLI VERİ ═══
const DATA_URL='https://www.elfiniletisim.com';
let PRODUCTS=[];
let dataLoaded=false;
let tarifeler=[], cihazlar=[], evInternet=[], marketPrices=[];
let extraKB="";
const KASKO_ROWS=[
  {a:"0–1.000",akgP:286,akgT:342,apP:454,apT:568},{a:"1.001–2.000",akgP:431,akgT:522,apP:737,apT:918},
  {a:"2.001–3.500",akgP:646,akgT:792,apP:1079,apT:1332},{a:"3.501–5.000",akgP:902,akgT:1116,apP:1489,apT:1872},
  {a:"5.001–6.500",akgP:1116,akgT:1386,apP:1817,apT:2268},{a:"6.501–8.000",akgP:1229,akgT:1530,apP:1867,apT:2322},
  {a:"8.001–9.500",akgP:1387,akgT:1728,apP:2249,apT:2790},{a:"9.501–11.000",akgP:1525,akgT:1872,apP:2345,apT:2916},
  {a:"11.001–12.500",akgP:1252,akgT:1548,apP:2177,apT:2718},{a:"12.501–14.000",akgP:1357,akgT:1692,apP:2299,apT:2862},
  {a:"14.001–15.500",akgP:1461,akgT:1818,apP:2499,apT:3114},{a:"15.501–17.000",akgP:1562,akgT:1944,apP:2858,apT:3572},
  {a:"17.001–18.500",akgP:1661,akgT:2070,apP:3099,apT:3873},{a:"18.501–20.000",akgP:1758,akgT:2196,apP:3367,apT:4194},
  {a:"20.001–22.500",akgP:1940,akgT:2412,apP:3649,apT:4554},{a:"22.501–25.000",akgP:2168,akgT:2700,apP:4080,apT:5094},
  {a:"25.001–27.500",akgP:2396,akgT:2988,apP:4510,apT:5634},{a:"27.501–30.000",akgP:2625,akgT:3276,apP:4937,apT:6156},
  {a:"30.001–35.000",akgP:2853,akgT:3564,apP:5839,apT:7290},{a:"35.001–40.000",akgP:3538,akgT:4410,apP:7176,apT:8964},
  {a:"40.001–45.000",akgP:3994,akgT:4986,apP:8644,apT:10800},{a:"45.001–50.000",akgP:4366,akgT:5454,apP:10043,apT:12554},
  {a:"50.001–60.000",akgP:5249,akgT:6552,apP:12284,apT:15354},{a:"60.001–70.000",akgP:6162,akgT:7686,apP:14814,apT:18504},
  {a:"70.001–80.000",akgP:7075,akgT:8838,apP:15564,apT:19440},{a:"80.001–90.000",akgP:7988,akgT:9972,apP:16352,apT:20430},
  {a:"90.001–100.000",akgP:8901,akgT:11124,apP:17180,apT:21474},{a:"100.001–125.000",akgP:9535,akgT:11916,apP:18403,apT:22986},
  {a:"125.001–150.000",akgP:9916,akgT:12384,apP:19139,apT:23922},{a:"150.001–200.000",akgP:10363,akgT:12942,apP:20001,apT:24984},
  {a:"200.001+",akgP:10881,akgT:13590,apP:21001,apT:26244},
];

async function loadWebsiteData(){
  try{
    // Tarifeleri yükle
    const tRes=await fetch(DATA_URL+'/tariffs_custom.json');
    if(tRes.ok){
      const tData=await tRes.json();
      const categories=tData.tarifeler||tData;
      const catArray=Array.isArray(categories)?categories:[];
      let tId=0;
      catArray.forEach(cat=>{
        if(cat.tarifeler&&Array.isArray(cat.tarifeler)){
          cat.tarifeler.forEach(t=>{
            tId++;
            tarifeler.push({
              id:'t'+tId,
              type:'tarife',
              name:t.ad||'',
              price:(t.fiyat||0)+' TL/ay',
              desc:t.icerik||'',
              features:[
                t.gb?t.gb+' GB İnternet':null,
                t.dk?(t.dk>=3000?'Sınırsız Dakika':t.dk+' Dakika'):null,
                t.sms?(t.sms>=3000?'Sınırsız SMS':t.sms+' SMS'):null,
              ].filter(Boolean),
              category:cat.ad||'',
              raw:t
            });
          });
        }
      });
      toast('Tarifeler: '+tarifeler.length);
    }
  }catch(e){console.log('Tarife yükleme hatası:',e)}

  try{
    // Cihazları yükle — telefon + aksesuar
    const dRes=await fetch(DATA_URL+'/devices.json');
    if(dRes.ok){
      const dData=await dRes.json();
      const addDevices=(arr,kategori)=>{
        if(!Array.isArray(arr))return;
        arr.forEach((d,i)=>{
          const taksitler=[];
          if(d.t12&&d.t12>0)taksitler.push('12 taksit: '+d.t12.toLocaleString('tr-TR')+' TL');
          if(d.t24&&d.t24>0)taksitler.push('24 taksit: '+d.t24.toLocaleString('tr-TR')+' TL');
          if(d.t36&&d.t36>0)taksitler.push('36 taksit: '+d.t36.toLocaleString('tr-TR')+' TL');
          cihazlar.push({
            id:kategori[0]+(cihazlar.length+1),
            type:'cihaz',
            kategori:kategori,
            name:(d.m||'')+' '+(d.n||''),
            price:d.p?d.p.toLocaleString('tr-TR')+' TL':'Fiyat sorunuz',
            desc:(d.n||'')+' — Peşin: '+(d.p?d.p.toLocaleString('tr-TR')+' TL':''),
            features:taksitler.length>0?taksitler:[(d.n||'')],
            marka:d.m||'',
            raw:d
          });
        });
      };
      addDevices(dData.telefon||[],'telefon');
      addDevices(dData.tablet||[],'tablet');
      addDevices(dData.notebook||[],'notebook');
      addDevices(dData.aksesuar||[],'aksesuar');
      toast('Cihazlar: '+cihazlar.length);
    }
  }catch(e){console.log('Cihaz yükleme hatası:',e)}

  try{
    // Ev interneti yükle
    const eRes=await fetch(DATA_URL+'/evinternet_tariffs.json');
    if(eRes.ok){
      const eData=await eRes.json();
      if(eData&&eData.kategoriler){
        eData.kategoriler.forEach(kat=>{
          (kat.kampanyalar||[]).forEach(k=>{
            (k.paketler||[]).forEach(p=>{
              evInternet.push({
                kategori:kat.kategori,
                kampanya:k.ad,
                hiz:p.hiz,
                fiyat:p.fiyat,
                taahhut:k.taah||''
              });
            });
          });
        });
      }
      toast('Ev interneti: '+evInternet.length+' paket');
    }
  }catch(e){console.log('Ev interneti yükleme hatası:',e)}

  try{
    // Peşin piyasa fiyatları yükle
    const mRes=await fetch(DATA_URL+'/api/market-prices');
    if(mRes.ok){
      const mData=await mRes.json();
      if(mData&&mData.items)marketPrices=mData.items.slice(0,50);
      toast('Piyasa fiyatları: '+marketPrices.length+' ürün');
    }
  }catch(e){console.log('Piyasa fiyatı yükleme hatası:',e)}

  try{
    // Ek kurallar (site chatbot ile ortak)
    const kbRes=await fetch(DATA_URL+'/chatbot_kb_extra.json');
    if(kbRes.ok){const kbData=await kbRes.json();if(kbData&&kbData.content)extraKB=kbData.content;}
  }catch(e){console.log('Ek kural yükleme hatası:',e)}

  PRODUCTS=[...tarifeler,...cihazlar];
  dataLoaded=true;

  if(PRODUCTS.length===0){
    toast('Veri yüklenemedi, varsayılan veriler kullanılıyor');
    PRODUCTS=[
      {id:"t1",type:"tarife",name:"YAPBOZ 8GB",price:"449 TL/ay",desc:"8GB internet",features:["8GB İnternet","1000 Dakika"]},
      {id:"c1",type:"cihaz",name:"iPhone 15",price:"64.999 TL",desc:"A16 Bionic",features:["48MP Kamera"]},
    ];
  }
  render();
}

function buildSystemPrompt(){
  // Tarife özeti
  const tOzet=tarifeler.slice(0,50).map(t=>t.name+': '+t.price+' ('+t.desc+') ['+t.category+']').join('\n');
  
  // Cihaz özeti — markaya göre grupla, hepsi dahil
  const markalar={};
  cihazlar.forEach(c=>{
    const key=(c.kategori||'telefon').toUpperCase()+' / '+c.marka;
    if(!markalar[key])markalar[key]=[];
    markalar[key].push(c);
  });
  const cOzet=Object.entries(markalar).map(([m,liste])=>
    m+' ('+liste.length+' model): '+liste.map(c=>c.name.replace(c.marka+' ','')+': '+c.price).join(', ')
  ).join('\n');
  
  // Ev interneti özeti
  const eiOzet=evInternet.length>0?evInternet.map(e=>
    e.kategori+' — '+e.kampanya+': '+e.hiz+(e.fiyat?' → '+e.fiyat+' TL/ay':'')+(e.taahhut?' ('+e.taahhut+')':'')
  ).join('\n'):'Ev interneti bilgisi yüklenmedi';
  
  // Kasko özeti
  const kaskoOzet=KASKO_ROWS.map(r=>r.a+' TL → AKG Peşin:'+r.akgP+' Taksit:'+r.akgT+' | AKG+ Peşin:'+r.apP+' Taksit:'+r.apT).join('\n');
  
  // Market/peşin fiyat özeti
  const marketOzet=marketPrices.length>0?marketPrices.map(it=>it.name+': '+(it.price?it.price.toLocaleString('tr-TR'):'-')+' TL').join('\n'):'Piyasa fiyatı bilgisi yüklenmedi';
  
  // Ürün ID listesi
  const pList=PRODUCTS.slice(0,80).map(p=>p.id+':'+p.name+' ('+p.price+')').join(', ');

  return`Sen Konya Elfin İletişim mağazasının (Turkcell Yetkili Bayi) yapay zekâ asistanısın. Adın Abban. Aynı zamanda Superonline ev interneti yetkili bayisisin.

MAĞAZADA BULUNAN MARKALAR: ${[...new Set(cihazlar.map(c=>c.marka))].join(', ')||'Apple, Samsung, Xiaomi, Oppo'}

TARİFELER (${tarifeler.length} adet):
${tOzet||'Tarife bilgisi yüklenmedi'}

CİHAZLAR (${cihazlar.length} adet — telefon, tablet, notebook, aksesuar):
${cOzet||'Cihaz bilgisi yüklenmedi'}

CİHAZ KASKO (AKG / AKG+) FİYATLARI (yıllık, 5G indirimli):
Kasko fiyatları cihaz peşin fiyat aralığına göre belirlenir.
Fiyat Aralığı (TL) → AKG Peşin | AKG Taksitli | AKG+ Peşin | AKG+ Taksitli
${kaskoOzet}
NOT: Kasko fiyatı sorulduğunda ÖNCE cihazın peşin fiyatını sor, sonra bu tablodan eşleştir.

PEŞİN PİYASA FİYATLARI (${marketPrices.length} ürün):
${marketOzet}
NOT: Bunlar 2. el / peşin piyasa referans fiyatlarıdır, mağaza satış fiyatı değildir.

EV İNTERNETİ (${evInternet.length} paket):
${eiOzet}

ÜRÜN ID LİSTESİ (product_id için kullan):
${pList}

HER CEVABIN SADECE JSON OLSUN:
{"message":"cevabın buraya","product_id":null}
Ürün önerirsen product_id ekle:
{"message":"Sağımda gördüğünüz bu tarife tam size göre!","product_id":"t2"}

KURALLAR:

let faceReady=false, camActive=false, lastGreet=0, faceLoop=null;
let registering=null, regCount=0;
let camStartTime=0; // Prevent immediate greeting after camera start
let people=JSON.parse(localStorage.getItem('elfin_people')||'[]');

function savePeople(){
  localStorage.setItem('elfin_people',JSON.stringify(people));
}

async function initFaceDetection(){
  if(!window.faceapi){toast("Yüz algılama kütüphanesi yüklenemedi");return}
  try{
    toast("AI modelleri yükleniyor...");
    const U="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model";
    await faceapi.nets.tinyFaceDetector.loadFromUri(U);
    await faceapi.nets.faceLandmark68Net.loadFromUri(U);
    await faceapi.nets.faceRecognitionNet.loadFromUri(U);
    faceReady=true;
    toast("Yüz tanıma hazır! ("+people.length+" kişi kayıtlı)");
    startCamera();
  }catch(e){toast("Model yükleme hatası: "+e.message);console.error(e)}
}

async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:{ideal:320},height:{ideal:240}}});
    const vid=document.getElementById('cam');
    if(vid){vid.srcObject=stream;await vid.play();vid.style.display='block';
      document.getElementById('cam-canvas').style.display='block';
      camActive=true;camStartTime=Date.now();render();startFaceLoop();}
  }catch(e){toast("Kamera hatası: "+e.message);console.error(e)}
}

function startFaceLoop(){
  if(faceLoop)return;
  const vid=document.getElementById('cam');
  const cvs=document.getElementById('cam-canvas');
  if(!vid||!cvs)return;

  async function detect(){
    if(!camActive||!faceReady){faceLoop=setTimeout(detect,1000);return}
    // Only detect in idle or registering mode
    if(S.mode!=="idle"&&registering===null){faceLoop=setTimeout(detect,1000);return}
    try{
      const dets=await faceapi.detectAllFaces(vid,new faceapi.TinyFaceDetectorOptions({scoreThreshold:0.5}))
        .withFaceLandmarks().withFaceDescriptors();
      const dims=faceapi.matchDimensions(cvs,vid,true);
      const resized=faceapi.resizeResults(dets,dims);
      const ctx=cvs.getContext('2d');
      ctx.clearRect(0,0,cvs.width,cvs.height);

      if(dets.length>0){
        const det=dets[0];
        const box=det.detection.box;
        const vW=vid.videoWidth||320;
        const facePct=(box.width/vW)*100;

        // Draw box
        const rb=resized[0]?.detection?.box;
        if(rb){
          ctx.strokeStyle=registering!==null?'#ffc72c':'#22c55e';
          ctx.lineWidth=2;ctx.strokeRect(rb.x,rb.y,rb.width,rb.height);
        }

        // REGISTRATION MODE
        if(registering!==null){
          const p=people[registering];
          if(p&&regCount<3&&facePct>10){
            p.descriptors.push(Array.from(det.descriptor));
            regCount++;
            savePeople();
            toast(p.name+": yüz örneği "+regCount+"/3 kaydedildi");
            if(regCount>=3){
              toast(p.name+" yüz kaydı tamamlandı!");
              registering=null;regCount=0;render();
            }
            // Wait between captures
            faceLoop=setTimeout(detect,1500);return;
          }
          faceLoop=setTimeout(detect,500);return;
        }

        // RECOGNITION MODE (only in idle, after 8 sec delay from camera start)
        if(S.mode==="idle"&&facePct>12){
          const now=Date.now();
          // Wait 8 seconds after camera starts before auto-greeting
          if(now-camStartTime<8000){faceLoop=setTimeout(detect,600);return}
          if(now-lastGreet>15000&&S.apiKey){
            lastGreet=now;
            // Try to match face
            let matchedName=null;
            const labeled=[];
            people.forEach(p=>{
              if(p.descriptors.length>=3){
                labeled.push(new faceapi.LabeledFaceDescriptors(p.name,
                  p.descriptors.map(d=>new Float32Array(d))));
              }
            });
            if(labeled.length>0){
              const matcher=new faceapi.FaceMatcher(labeled,0.5);
              const match=matcher.findBestMatch(det.descriptor);
              if(match.label!=="unknown")matchedName=match.label;
            }

            // Camera pulse
            document.getElementById('cam').style.borderColor=matchedName?'#ffc72c':'#22c55e';
            setTimeout(()=>{const c=document.getElementById('cam');if(c)c.style.borderColor='var(--bd)'},2000);

            if(matchedName){
              const p=people.find(x=>x.name===matchedName);
              const role=p?.role||'';
              handleStartPerson(matchedName,role);
            }else{
              handleStart();
            }
          }
        }
      }
    }catch(e){console.log('face err:',e)}
    faceLoop=setTimeout(detect,600);
  }
  detect();
}

// Greeting for known person
async function handleStartPerson(name,role){
  if(!S.apiKey)return;
  const isEmp=role&&(role.includes('Çalışan')||role.includes('Personel')||role.includes('Yönetici'));
  const g=isEmp
    ? "Merhaba "+name+"! Bugün nasılsın?"
    : "Hoşgeldiniz "+name+"! Size nasıl yardımcı olabilirim?";
  S.mode="greeting";S.msgs=[{role:"assistant",content:g}];S.product=null;S.pointDir=null;render();
  await speak(g);
  S.mode="listening";render();resetInact();autoListen();
}

function startRegistration(idx){
  if(!camActive){toast("Önce kamerayı başlatın");return}
  if(!faceReady){toast("Model henüz yüklenmedi");return}
  registering=idx;regCount=0;
  people[idx].descriptors=[];savePeople();
  toast(people[idx].name+" için kameraya bakın — 3 farklı açıdan");
  render();
}

function stopCamera(){
  camActive=false;registering=null;regCount=0;
  const vid=document.getElementById('cam');
  if(vid&&vid.srcObject){vid.srcObject.getTracks().forEach(t=>t.stop());vid.srcObject=null;vid.style.display='none';}
  document.getElementById('cam-canvas').style.display='none';
  if(faceLoop){clearTimeout(faceLoop);faceLoop=null;}
}

// ═══ TÜRKÇE TELAFFUZ DÜZELTMESİ ═══
function turkishPronounce(text){
  if(!text)return text;
  let t=text;
  
  // Sayıları yazıya çevir
  const ones=['','bir','iki','üç','dört','beş','altı','yedi','sekiz','dokuz'];
  const tens=['','on','yirmi','otuz','kırk','elli','altmış','yetmiş','seksen','doksan'];
  
  function numToTR(n){
    if(n===0)return 'sıfır';
    let s='';
    if(n>=1000000){const m=Math.floor(n/1000000);s+=(m>1?numToTR(m)+' ':'')+'milyon ';n%=1000000;}
    if(n>=1000){const k=Math.floor(n/1000);s+=(k>1?numToTR(k)+' ':'')+'bin ';n%=1000;}
    if(n>=100){const h=Math.floor(n/100);s+=(h>1?ones[h]+' ':'')+'yüz ';n%=100;}
    if(n>=10){s+=tens[Math.floor(n/10)]+' ';n%=10;}
    if(n>0)s+=ones[n];
    return s.trim();
  }
  
  // Fiyat formatları: 64.999 TL, 449 TL/ay
  t=t.replace(/(\d{1,3}(?:\.\d{3})*)\s*TL\/ay/gi,(m,num)=>{
    const n=parseInt(num.replace(/\./g,''));
    return numToTR(n)+' lira aylık';
  });
  t=t.replace(/(\d{1,3}(?:\.\d{3})*)\s*TL/gi,(m,num)=>{
    const n=parseInt(num.replace(/\./g,''));
    return numToTR(n)+' lira';
  });
  
  // Data miktarları: 20GB, 4 GB, 2TB
  t=t.replace(/(\d+)\s*TB/gi,(m,n)=>numToTR(parseInt(n))+' terabayt');
  t=t.replace(/(\d+)\s*GB/gi,(m,n)=>numToTR(parseInt(n))+' gigabayt');
  t=t.replace(/(\d+)\s*MB/gi,(m,n)=>numToTR(parseInt(n))+' megabayt');
  
  // Hız: 100 Mbps, 50Mbps
  t=t.replace(/(\d+)\s*Mbps/gi,(m,n)=>numToTR(parseInt(n))+' megabit');
  
  // Kamera: 48MP, 50 MP
  t=t.replace(/(\d+)\s*MP/gi,(m,n)=>numToTR(parseInt(n))+' megapiksel');
  
  // Batarya: 5000mAh
  t=t.replace(/(\d+)\s*mAh/gi,(m,n)=>numToTR(parseInt(n))+' miliamper saat');
  
  // Yüzde: %20, %50
  t=t.replace(/%\s*(\d+)/g,(m,n)=>'yüzde '+numToTR(parseInt(n)));
  
  // Ekran boyutları: 6.1", 6.1 inch
  t=t.replace(/(\d+)\.(\d+)\s*["″''inch]*/gi,(m,a,b)=>a+' nokta '+b+' inç');
  
  // Kalan büyük sayılar (noktalı: 64.999)
  t=t.replace(/\b(\d{1,3})\.(\d{3})(?:\.(\d{3}))?\b/g,(m,a,b,c)=>{
    const n=parseInt(a+b+(c||''));
    return numToTR(n);
  });
  
  // Teknoloji kısaltmaları
  t=t.replace(/\bSMS\b/gi,'es em es');
  t=t.replace(/\bMNT\b/gi,'em en te');
  t=t.replace(/\bNTC\b/gi,'numara taşıma');
  t=t.replace(/\bSIM\b/gi,'sim');
  t=t.replace(/\b5G\b/g,'beş ci');
  t=t.replace(/\b4G\b/g,'dört ci');
  t=t.replace(/\b4\.5G\b/g,'dört buçuk ci');
  t=t.replace(/\bLTE\b/gi,'el ti i');
  t=t.replace(/\bWi-?Fi\b/gi,'vayfay');
  t=t.replace(/\bAMOLED\b/gi,'amöled');
  t=t.replace(/\bOLED\b/gi,'öled');
  t=t.replace(/\bHDR\b/gi,'eç di ar');
  t=t.replace(/\bNFC\b/gi,'en ef ce');
  t=t.replace(/\bUSB\b/gi,'yu es bi');
  t=t.replace(/\bGPS\b/gi,'ci pi es');
  t=t.replace(/\bCPU\b/gi,'si pi yu');
  t=t.replace(/\bRAM\b/gi,'ram');
  t=t.replace(/\bROM\b/gi,'rom');
  t=t.replace(/\bAI\b/g,'yapay zekâ');
  t=t.replace(/\bTV\+/gi,'tivi plus');
  t=t.replace(/\bGB\b/gi,'gigabayt');
  
  // Marka/ürün telaffuzları
  t=t.replace(/\bXiaomi\b/gi,'şiyaomi');
  t=t.replace(/\bHuawei\b/gi,'huavey');
  t=t.replace(/\bSamsung\b/gi,'samsung');
  t=t.replace(/\biPhone\b/gi,'ayfon');
  t=t.replace(/\bSnapdragon\b/gi,'snapdregın');
  t=t.replace(/\bBionic\b/gi,'bayonik');
  t=t.replace(/\bSuperonline\b/gi,'süperonlayn');
  t=t.replace(/\bTurkcell\b/gi,'türksel');
  t=t.replace(/\bFizy\b/gi,'fizi');
  t=t.replace(/\blifebox\b/gi,'layfboks');
  
  // Kısa birimler
  t=t.replace(/\bdk\b/gi,'dakika');
  t=t.replace(/\bay\b/g,'ay');
  
  // Kalan tekli sayıları çevir (3 haneli ve üstü)
  t=t.replace(/\b(\d{3,})\b/g,(m,n)=>numToTR(parseInt(n)));
  
  // Çoklu boşlukları temizle
  t=t.replace(/\s+/g,' ').trim();
  
  return t;
}

let voices=[];

function trVoice(){
  const all=voices.filter(v=>v.lang.startsWith('tr'));
  const google=all.find(v=>v.name.includes('Google'));
  if(google)return google;
  const online=all.find(v=>!v.localService);
  if(online)return online;
  return all[0]||null;
}

// ElevenLabs TTS
async function speakElevenLabs(text){
  const voiceId=S.elVoiceId||'onwK4e9ZLuTAKqWW03F9'; // Daniel - calm male
  const res=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`,{
    method:'POST',
    headers:{'Content-Type':'application/json','xi-api-key':S.elKey},
    body:JSON.stringify({
      text:text,
      model_id:'eleven_multilingual_v2',
      voice_settings:{
        stability: parseFloat(S.elStability||0.82),
        similarity_boost: parseFloat(S.elSimilarity||0.80),
        style: parseFloat(S.elStyle||0.08),
        use_speaker_boost:true
      }
    })
  });
  if(!res.ok){
    let detail='';try{const e=await res.json();detail=e.detail?.message||e.detail||''}catch(x){}
    throw new Error('ElevenLabs '+res.status+(detail?': '+detail:''));
  }
  const blob=await res.blob();
  const url=URL.createObjectURL(blob);
  return new Promise((resolve)=>{
    const audio=new Audio(url);
    audio.onended=()=>{URL.revokeObjectURL(url);resolve()};
    audio.onerror=()=>{URL.revokeObjectURL(url);resolve()};
    audio.play().catch(()=>resolve());
  });
}

// Browser TTS fallback
function speakBrowser(text){
  return new Promise(res=>{
    if(!('speechSynthesis' in window)||!text){res();return}
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='tr-TR';u.rate=0.9;u.pitch=1.0;u.volume=1;
    const v=trVoice();if(v)u.voice=v;
    u.onend=()=>res();u.onerror=()=>res();
    setTimeout(()=>speechSynthesis.speak(u),80);
  });
}

// Main speak function - preprocesses text, tries ElevenLabs first, falls back to browser
async function speak(text){
  if(!text)return;
  const processed=turkishPronounce(text);
  S.mode="speaking";startMouth();render();
  
  if(S.ttsMode==='elevenlabs'&&S.elKey){
    try{
      await speakElevenLabs(processed);
      stopMouth();return;
    }catch(e){
      console.log('ElevenLabs failed:',e);
      const msg=e.message||'';
      if(msg.includes('401'))toast("ElevenLabs: API key gecersiz!");
      else if(msg.includes('403')||msg.includes('429'))toast("ElevenLabs: Krediniz bitmis! Plani yükseltin.");
      else toast("ElevenLabs hatasi: "+msg.slice(0,50));
    }
  }
  // Fallback to browser TTS
  await speakBrowser(processed);
  stopMouth();
}
function startMouth(){stopMouth();mouthT=setInterval(()=>{S.mouth=(S.mouth+1)%3;rAvatar()},130)}
function stopMouth(){if(mouthT){clearInterval(mouthT);mouthT=null}S.mouth=0}

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

function startSTT(){
  if(!SR||S.holding||S.loading||S.mode==="speaking")return;
  if(location.protocol==='file:'){toast("Mikrofon icin HTTPS gerekli. GitHub Pages'e deploy edin.");return}
  rec=new SR();rec.lang='tr-TR';rec.continuous=false;rec.interimResults=false;
  rec.onresult=e=>{const t=e.results[0]?.[0]?.transcript;if(t)sendMsg(t)};
  rec.onerror=e=>{S.holding=false;render();if(e.error==='not-allowed')toast("Mikrofon izni verilmedi")};
  rec.onend=()=>{S.holding=false;render()};
  try{rec.start();S.holding=true;render()}catch(e){toast("Mikrofon baslatilamadi")}
}
function stopSTT(){try{rec?.stop()}catch(e){}S.holding=false;render()}
function autoListen(){setTimeout(()=>{if(S.mode==="listening"&&!S.loading&&!S.holding)startSTT()},600)}

// ═══ API ═══
async function callAPI(msgs){
  if(!S.apiKey){
    S.showSettings=true;render();
    toast("Claude API key gerekli. Ayarlardan girin.");
    throw new Error('API key gerekli');
  }
  let res;
  try{
    res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,system:buildSystemPrompt(),
        messages:msgs.map(m=>({role:m.role,content:m.content}))})
    });
  }catch(e){
    toast("İnternet bağlantı hatası");
    throw e;
  }
  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    const errMsg=err.error?.message||'Bilinmeyen hata';
    if(res.status===401){
      toast("Claude API key geçersiz! Ayarlardan kontrol edin.");
      S.showSettings=true;render();
      throw new Error('Invalid key');
    }
    toast("API hatası: "+errMsg);
    throw new Error(errMsg);
  }
  const data=await res.json();
  const raw=data.content?.map(c=>c.text||"").join("")||'';
  try{const m=raw.match(/\{[\s\S]*?\}/);if(m){const p=JSON.parse(m[0]);return{msg:p.message||"",pid:p.product_id||null}}}catch(e){}
  return{msg:raw.replace(/[{}"]/g,"").replace(/message:|product_id:\s*null/gi,"").trim()||"Bir sorun oluştu.",pid:null};
}

// ═══ ACTIONS ═══
async function handleStart(){
  if(!S.apiKey){S.showSettings=true;render();toast("Lütfen önce Claude API key giriniz");return}
  const g="Hoşgeldiniz! Nasıl yardımcı olabilirim?";
  S.mode="greeting";S.msgs=[{role:"assistant",content:g}];S.product=null;S.pointDir=null;render();
  await speak(g);
  S.mode="listening";render();resetInact();autoListen();
}

async function sendMsg(text){
  const msg=(text||S.input).trim();if(!msg||S.loading)return;
  S.input="";S.product=null;S.pointDir=null;resetInact();
  S.msgs.push({role:"user",content:msg});S.loading=true;S.mode="thinking";render();scroll();
  try{
    const{msg:reply,pid}=await callAPI(S.msgs);
    S.msgs.push({role:"assistant",content:reply});
    if(pid){const p=PRODUCTS.find(x=>x.id===pid);if(p){const side=S.lastSide==="right"?"left":"right";S.lastSide=side;S.pSide=side;S.pointDir=side;S.product=p;}}
    S.loading=false;render();scroll();
    await speak(reply);
    if(!pid)S.pointDir=null;
    S.mode="listening";render();autoListen();
  }catch(e){
    console.error('sendMsg error:',e);
    if(!S.msgs[S.msgs.length-1]||S.msgs[S.msgs.length-1].role!=="assistant")
      S.msgs.push({role:"assistant",content:"Bağlantı hatası oluştu. Lütfen tekrar deneyin."});
    S.loading=false;S.mode="listening";render();scroll();autoListen();
  }
}

function handleReset(){speechSynthesis?.cancel();stopMouth();S.mode="idle";S.msgs=[];S.input="";S.product=null;S.pointDir=null;S.loading=false;render();
  // Re-enable face detection after reset
  if(camActive&&faceReady)startFaceLoop();
}

    :`<path d="${isA?"M134 181Q142 192 150 192Q158 192 166 181":"M136 183Q143 188 150 188Q157 188 164 183"}"stroke="#c4524a"stroke-width="2.5"fill="none"stroke-linecap="round"style="transition:all .5s"/>`;

<button class="chip"onclick="sendMsg('Numara taşımak istiyorum')">Numara Taşıma</button></div>`;
    h+=`<div id="ce"></div></div>`;
  }
  h+=`</div>`;

  if(ic){
    const dis=S.loading||S.mode==="speaking";

    h+=`<div class="inbar">

  // Bind events
  const mi=document.getElementById('mi');

  const tr=document.getElementById('toast-root');
  tr.innerHTML=S.toast?`<div class="toast">${S.toast}</div>`:'';
  scroll();
}

  document.getElementById('btn-close-settings').addEventListener('click',function(){S.showSettings=false;render()});
  document.getElementById('btn-close-bottom').addEventListener('click',function(){S.showSettings=false;render()});
  document.getElementById('btn-save-settings').addEventListener('click',function(){saveAllSettings()});
  document.getElementById('btn-test-voice').addEventListener('click',function(){testVoice()});
  document.getElementById('btn-tts-el').addEventListener('click',function(){S.ttsMode='elevenlabs';renderSettings()});
  document.getElementById('btn-tts-br').addEventListener('click',function(){S.ttsMode='browser';renderSettings()});
  // Voice dropdown — show custom input when "Özel" selected
  const voiceSel=document.getElementById('voice-sel');
  const customInp=document.getElementById('custom-voice-inp');
  if(voiceSel&&customInp){
    voiceSel.addEventListener('change',function(){customInp.style.display=this.value==='__custom__'?'block':'none'});
  }
  // Avatar buttons
  document.querySelectorAll('#avatar-btns button').forEach(b=>{
    b.addEventListener('click',function(){S.avatar=this.dataset.av;localStorage.setItem('elfin_avatar',S.avatar);renderSettings();rAvatar()});
  });
  // Voice tuning sliders
  const slStab=document.getElementById('sl-stab');
  const slSim=document.getElementById('sl-sim');
  const slSty=document.getElementById('sl-sty');
  if(slStab)slStab.addEventListener('input',function(){S.elStability=(this.value/100).toFixed(2);document.getElementById('stab-val').textContent=this.value+'%'});
  if(slSim)slSim.addEventListener('input',function(){S.elSimilarity=(this.value/100).toFixed(2);document.getElementById('sim-val').textContent=this.value+'%'});
  if(slSty)slSty.addEventListener('input',function(){S.elStyle=(this.value/100).toFixed(2);document.getElementById('sty-val').textContent=this.value+'%'});
  // Prevent card clicks from closing overlay
  document.getElementById('settings-card').addEventListener('click',function(e){e.stopPropagation()});
  // Person management
  const addBtn=document.getElementById('btn-add-person');
  if(addBtn){addBtn.addEventListener('click',function(){
    const name=prompt('Kişi adı:');
    if(name&&name.trim()){
      const role=prompt('Rolü (Yönetici / Çalışan / Müşteri):','');
      people.push({name:name.trim(),role:role||'',descriptors:[]});
      savePeople();renderSettings();
    }
  });}
  document.querySelectorAll('.reg-btn').forEach(b=>{
    b.addEventListener('click',function(){
      S.showSettings=false;render();
      setTimeout(()=>startRegistration(parseInt(this.dataset.reg)),300);
    });
  });
  document.querySelectorAll('.del-btn').forEach(b=>{
    b.addEventListener('click',function(){
      const idx=parseInt(this.dataset.del);
      if(confirm(people[idx]?.name+' silinsin mi?')){people.splice(idx,1);savePeople();renderSettings();}
    });
  });
}

function saveAllSettings(){
  const apiKey=document.getElementById('api-inp')?.value?.trim()||'';
  const elKey=document.getElementById('el-inp')?.value?.trim()||'';
  let voiceId=document.getElementById('voice-sel')?.value||'onwK4e9ZLuTAKqWW03F9';
  if(voiceId==='__custom__'){voiceId=document.getElementById('custom-voice-inp')?.value?.trim()||'onwK4e9ZLuTAKqWW03F9'}
  const ttsMode=S.ttsMode||'elevenlabs';
  
  S.apiKey=apiKey;S.elKey=elKey;S.elVoiceId=voiceId;S.ttsMode=ttsMode;S._voicesFetched=false;
  localStorage.setItem('elfin_api_key',apiKey);
  localStorage.setItem('elfin_el_key',elKey);
  localStorage.setItem('elfin_el_voice',voiceId);
  localStorage.setItem('elfin_tts_mode',ttsMode);
  localStorage.setItem('elfin_avatar',S.avatar);
  localStorage.setItem('elfin_el_stability',S.elStability);
  localStorage.setItem('elfin_el_similarity',S.elSimilarity);
  localStorage.setItem('elfin_el_style',S.elStyle);
  
  S.showSettings=false;
  render();
  toast("Ayarlar kaydedildi!");
}

async function testVoice(){
  const elKey=document.getElementById('el-inp')?.value?.trim()||S.elKey;
  let voiceId=document.getElementById('voice-sel')?.value||'onwK4e9ZLuTAKqWW03F9';
  if(voiceId==='__custom__'){voiceId=document.getElementById('custom-voice-inp')?.value?.trim()||'onwK4e9ZLuTAKqWW03F9'}
  const ttsMode=S.ttsMode||'elevenlabs';
  
  if(ttsMode==='elevenlabs'&&!elKey){toast("Lütfen ElevenLabs API key girin");return}
  
  toast("Ses test ediliyor...");
  
  if(ttsMode==='elevenlabs'&&elKey){
    try{
      const oldKey=S.elKey;const oldVoice=S.elVoiceId;
      S.elKey=elKey;S.elVoiceId=voiceId;
      startMouth();
      await speakElevenLabs(turkishPronounce("Merhaba! Ben Abban. Bugün 20GB internet ve sınırsız SMS içeren YAPBOZ tarifemiz sadece 649 TL. iPhone 15 ise 64.999 TL'den başlıyor. Size nasıl yardımcı olabilirim?"));
      stopMouth();
      S.elKey=oldKey;S.elVoiceId=oldVoice;
      toast("Ses testi başarılı!");
    }catch(e){
      stopMouth();
      toast("ElevenLabs hatası: "+e.message);
    }
  }else{
    startMouth();
    await speakBrowser(turkishPronounce("Merhaba! Ben Abban. 20GB internet 649 TL. Size nasıl yardımcı olabilirim?"));
    stopMouth();
    toast("Tarayıcı sesi ile test edildi");
  }
}

function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

// Detail modal

  S.detailProd=PRODUCTS.find(p=>p.id===id);
  if(!S.detailProd)return;
  const p=S.detailProd,tc={tarife:"#ffc72c",cihaz:"#00c8ff",internet:"#22c55e"},c=tc[p.type];
  document.getElementById('modal-root').innerHTML=`<div class="mo"onclick="clDet()">
<div class="mc"style="border:1px solid ${c}55;box-shadow:0 20px 60px ${c}33"onclick="event.stopPropagation()">
<div style="display:flex;justify-content:space-between;margin-bottom:14px"><div style="font-size:11px;color:${c};font-weight:600;text-transform:uppercase;letter-spacing:.1em">${p.type.toUpperCase()} DETAYI</div><button class="mc-x"onclick="clDet()">✕</button></div>
<div style="font-size:22px;font-weight:800;margin-bottom:4px">${p.name}</div>
<div style="font-size:26px;font-weight:800;color:${c};margin-bottom:14px">${p.price}</div>
<div style="font-size:13px;color:var(--txM);line-height:1.6;margin-bottom:16px">${p.desc}</div>
<div style="font-size:12px;font-weight:600;margin-bottom:8px">Özellikler</div>
<div class="mf">${p.features.map(f=>`<div class="mfi"><div class="mfi-d"style="background:${c}"></div>${f}</div>`).join('')}</div>
<button class="mc-btn"style="background:linear-gradient(135deg,${c},${c}bb);color:${p.type==="tarife"?"var(--bg)":"#fff"}"onclick="clDet()">Personel Çağır</button>
</div></div>`};
window.clDet=function(){S.detailProd=null;document.getElementById('modal-root').innerHTML=''};
window.clProd=function(){S.product=null;S.pointDir=null;render()};
window.handleStart=handleStart;window.handleReset=handleReset;window.sendMsg=sendMsg;window.S=S;
window.saveAllSettings=saveAllSettings;window.testVoice=testVoice;
window.initFaceDetection=initFaceDetection;window.startCamera=startCamera;window.stopCamera=stopCamera;
window.startRegistration=startRegistration;window.handleStartPerson=handleStartPerson;
window.people=people;window.savePeople=savePeople;

// INIT
render();
// Load website data
loadWebsiteData();
// Show settings if no API key
if(!S.apiKey){setTimeout(()=>{S.showSettings=true;render()},500)}
// Auto-load face detection models
setTimeout(()=>{if(window.faceapi)initFaceDetection()},1000);

// Bind camera button (re-bind after each render)
const origRender=render;
render=function(){
  origRender();
  const cb=document.getElementById('btn-cam');
  if(cb&&!cb._b){cb._b=true;cb.addEventListener('click',function(){
    if(camActive){stopCamera();render();}
    else if(faceReady){startCamera();}
    else{initFaceDetection();}
  });}
}
</script>
